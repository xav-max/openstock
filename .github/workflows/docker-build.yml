name: Build and Publish to GHCR

on:
  workflow_dispatch: # Allows you to trigger the build manually
  push:
    branches: [ "main" ] # Auto-builds if you ever update the code

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # Grants the action permission to push to your GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- ADD THIS NEW STEP ---
      - name: Create dummy .env file for Next.js build validation
        run: |
          echo "NEXT_PUBLIC_FINNHUB_API_KEY=dummy_build_key" >> .env.production
          echo "INNGEST_SIGNING_KEY=dummy_build_key" >> .env.production
          echo "BETTER_AUTH_SECRET=dummy_build_key" >> .env.production
          echo "BETTER_AUTH_URL=http://localhost:3000" >> .env.production
          echo "MONGODB_URI=mongodb://localhost:27017/dummy_db" >> .env.production
          echo "NODEMAILER_EMAIL=dummy@gmail.com" >> .env.production
          echo "NODEMAILER_PASSWORD=dummy_password" >> .env.production
          echo "SKIP_EMAIL_VERIFICATION=true" >> .env.production
      # -------------------------

      - name: Set up QEMU (for architecture support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
